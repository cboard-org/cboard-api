version: 2.1
orbs:
  discord: antonioned/discord@0.1.0
jobs:
  build:
    docker:
      # The Node version should always match what's in .nvmrc.
      - image: cimg/node:18.18.1
        auth:
          username: cboardci
          password: $DOCKERHUB_PASSWORD
      - image: circleci/mongo:4.0
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - yarn-packages-v1-{{ .Branch }}-{{ checksum "yarn.lock" }}
            - yarn-packages-v1-{{ .Branch }}-
            - yarn-packages-v1-
      # Install and save node_modules to cache
      - run:
          name: Install dependencias 
          command: |
            yarn install --cache-folder ~/.cache/yarn
      - save_cache:
          paths:
            - ~/.cache/yarn
          key: yarn-packages-v1-{{ .Branch }}-{{ checksum "yarn.lock" }}
      - run:
          name: Decrypt the Google auth file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -in  google-auth.json.cipher \
            -out google-auth.json \
            -k $KEY
      - run:
          name: Decrypt the Google play console auth file 
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  google-play-auth.json.cipher \
            -out google-play-auth.json \
            -k $KEY
      - run: 
          name: Decrypt the Apple auth file
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  Apple-Sign-In-AuthKey.p8.cipher \
            -out Apple-Sign-In-AuthKey.p8 \
            -k $KEY         
      - run:
          name: Decrypt the Apple App Store Connect API key
          command: |
            openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  App-Store-Connect-API-Key.p8.cipher \
            -out App-Store-Connect-API-Key.p8 \
            -k $KEY
      # run tests
      - run: 
          name: Run Unitests
          command: MOCHA_FILE=~/junit/test-results.xml ./node_modules/.bin/mocha test --recursive --reporter mocha-junit-reporter --exit
          when: always
      - store_test_results:
          path: ~/junit
      - store_artifacts:
          path: ~/junit
  image:
    docker:
      # The Node version should always match what's in .nvmrc.
      - image: cimg/node:18.18.1
        auth:
          username: cboardci
          password: $DOCKERHUB_PASSWORD 
    working_directory: ~/repo
    steps:
      - checkout
      - restore_cache:
          keys:
            # when lock file changes, use increasingly general patterns to restore cache
            - yarn-packages-v1-{{ .Branch }}-{{ checksum "yarn.lock" }}
            - yarn-packages-v1-{{ .Branch }}-
            - yarn-packages-v1-
      # Install and save node_modules to cache
      - run: yarn install --cache-folder ~/.cache/yarn
      - save_cache:
          paths:
            - ~/.cache/yarn
          key: yarn-packages-v1-{{ .Branch }}-{{ checksum "yarn.lock" }}
      # Build Docker Image
      # https://circleci.com/docs/2.0/building-docker-images/#overview
      - setup_remote_docker:   # (2)
          docker_layer_caching: false  # (3)
      - run: |
          openssl aes-256-cbc -d -md sha256 \
              -in  google-auth.json.cipher \
              -out google-auth.json \
              -k $KEY
      - run: |
          openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  google-play-auth.json.cipher \
            -out google-play-auth.json \
            -k $KEY
      - run: |
          openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  Apple-Sign-In-AuthKey.p8.cipher \
            -out Apple-Sign-In-AuthKey.p8 \
            -k $KEY
      - run: |
          openssl aes-256-cbc -d -md sha256 \
            -pbkdf2 \
            -in  App-Store-Connect-API-Key.p8.cipher \
            -out App-Store-Connect-API-Key.p8 \
            -k $KEY
      # build and push Docker image
      - run: |
          TAG=0.1.$CIRCLE_BUILD_NUM
          docker build -t cboard/cboard-api:$TAG -t cboard/cboard-api:latest .
          docker login -u $DOCKER_USER -p $DOCKER_PASS
          docker push cboard/cboard-api:latest
          docker push cboard/cboard-api:$TAG
  deploy-qa:
    machine:
      image: ubuntu-2204:2024.11.1
    steps:
      - run:
          name: Deploy Over SSH
          command: |
            echo 'cboard-qa06.westus.cloudapp.azure.com \
            AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBK9FTOTcgK0KgvdqdUhPLfvnDhzbViGnvtaXWg1XKgq2LEzgUTaHwyDsV5lZ3NnXimwptzF6GvO3u1ySlR2C19s=' >> ~/.ssh/known_hosts
            ssh $SSH_USERNAME@$SSH_SERVER 'bash -ic \
            "docker image prune -f && \
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock cboard/cboard-bootstrap pull && \
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock cboard/cboard-bootstrap stop cboard-api && \
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock cboard/cboard-bootstrap kill cboard-api && \
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock --env-file /home/sharedFolder/env.qa.cboard-api   cboard/cboard-bootstrap up -d --no-deps cboard-api \
            " && exit'
      - discord/status:
          fail_only: false
          failure_message: "**${CIRCLE_USERNAME}**'s Cboard API deploy to QA: **${CIRCLE_JOB}** failed."
          webhook: '${DISCORD_STATUS_WEBHOOK}'
          success_message: '**${CIRCLE_USERNAME}** deployed Cboard API to QA!!.'
  postman-test:
    docker:
      - image: postman/newman
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install curl and bash
          command: apk add --no-cache curl bash
      - run:
          name: Run Postman collection against QA environment
          command: |
            newman run test/postman/cboard-api.postman_collection.json \
              --environment test/postman/cboard-qa.postman_environment.json \
              --reporters cli,junit \
              --reporter-junit-export ~/junit/newman-results.xml
      - store_test_results:
          path: ~/junit
      - store_artifacts:
          path: ~/junit
      - discord/status:
          fail_only: false
          failure_message: "**${CIRCLE_USERNAME}**'s Cboard API Postman tests against QA: **${CIRCLE_JOB}** failed."
          webhook: '${DISCORD_STATUS_WEBHOOK}'
          success_message: '**${CIRCLE_USERNAME}** Cboard API Postman tests passed on QA!!.'

workflows:
  version: 2
  build_test_image:
    jobs:
      - build:
          context: google-auth
      - image:
          context: google-auth
          requires:
            - build
          filters:
            branches:
              only: master
      - deploy-qa:
          requires:
            - image
          filters:
            branches:
              only: master
      - postman-test:
          requires:
            - deploy-qa
          filters:
            branches:
              only: master
